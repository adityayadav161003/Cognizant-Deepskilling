<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug - Event Portal</title>
    <script>
        function runCalculation() {
            console.log("Starting calculation...");
            let x = 10;
            let y = 20;
            let z = x + y;
            debugger;
            console.log("Calculated z = ", z);
            document.getElementById("output").innerText = "Result: " + z;
        }
    </script>
</head>
<body>
    <h2>Debugger Sandbox</h2>
    <button onclick="runCalculation()">Run Calculation</button>
    <p id="output"></p>
</body>
</html>
