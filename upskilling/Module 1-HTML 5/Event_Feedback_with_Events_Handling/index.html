<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback - Event Portal</title>
    <script>
        function validatePhone(input) {
            let val = input.value;
            let regex = /^\d{10}$/;
            if (!regex.test(val)) {
                alert("Please enter a valid 10-digit phone number.");
            }
        }
        function updateFee(select) {
            let fee = select.value === "tech" ? "$20" : select.value === "sports" ? "Free" : "$10";
            document.getElementById("feeDisplay").innerText = "Event Fee: " + fee;
        }
        function enlargeImage(img) {
            if (img.style.transform === "scale(1.5)") {
                img.style.transform = "scale(1)";
            } else {
                img.style.transform = "scale(1.5)";
            }
        }
        function countChars(textarea) {
            let count = textarea.value.length;
            document.getElementById("charCount").innerText = count + " characters entered";
        }
    </script>
</head>
<body>
    <h2>Event Feedback & Interaction</h2>
    <div>
        <label>Phone Number: </label>
        <input type="text" onblur="validatePhone(this)" placeholder="10-digit phone">
    </div>
    <div>
        <label>Event Type: </label>
        <select onchange="updateFee(this)">
            <option value="">Select event</option>
            <option value="tech">Tech Meetup</option>
            <option value="sports">Sports Day</option>
        </select>
        <span id="feeDisplay" style="margin-left:10px; font-weight:bold;"></span>
    </div>
    <div>
        <p>Double Click Image to Enlarge:</p>
        <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=200" 
             style="transition: transform 0.2s;" 
             ondblclick="enlargeImage(this)" alt="Double click to enlarge">
    </div>
    <div>
        <label>Feedback: </label><br>
        <textarea onkeyup="countChars(this)" rows="3" cols="40" placeholder="Type comments..."></textarea>
        <p id="charCount">0 characters entered</p>
    </div>
    <button onclick="alert('Submission Clicked!')">Submit</button>
</body>
</html>
