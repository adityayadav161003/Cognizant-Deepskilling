<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery - Event Portal</title>
    <style>
        .gallery-img {
            border: 2px solid #334155;
            border-radius: 8px;
            width: 200px;
            height: 150px;
            object-fit: cover;
        }
        table {
            width: 100%;
            margin-top: 20px;
        }
        td {
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Community Events Image Gallery</h2>
    <table>
        <caption>Past Event Highlights</caption>
        <tr>
            <td>
                <img class="gallery-img" src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=500" alt="Tech meetup" title="Tech Innovators Meetup">
                <p>Tech Meetup 2025</p>
            </td>
            <td>
                <img class="gallery-img" src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=500" alt="Conference" title="AI Conference">
                <p>AI & ML Conference</p>
            </td>
            <td>
                <img class="gallery-img" src="https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=500" alt="Bootcamp" title="Frontend Bootcamp">
                <p>Frontend Bootcamp</p>
            </td>
        </tr>
    </table>
</body>
</html>
